name: CI
on:
  push: { branches: [ main ] }
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: flowfoundry
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: "pnpm" }
      - run: pnpm i
      - run: pnpm db:migrate
        env: { DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowfoundry }
      - run: pnpm db:seed
        env: { DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowfoundry }
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @flowfoundry/web build
      - run: pnpm e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowfoundry
          STRIPE_MOCK: "1"
      - run: pnpm sbom
      - run: pnpm scan:secrets
